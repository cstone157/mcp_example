<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Socket Test</title>
    <!-- Load Socket.io Client Library from CDN -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #222; color: #0f0; }
        .box { border: 1px solid #444; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Server Status Monitor</h1>
    <div id="status" class="box">Waiting for connection...</div>

    <script>
        // Connect to your local node server
        const socket = io('http://localhost:3000');

        socket.on('connect', () => {
            console.log('Connected to server');
        });

        // Listen for the status report
        socket.on('server-status', (data) => {
            const display = JSON.stringify(data, null, 2);
            document.getElementById('status').innerText = display;
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = "Disconnected";
        });
    </script>
</body>
</html>
