# -----------------------------------------------------------
# Postgresql : 
# -----------------------------------------------------------
postgres:
  enabled: true
  labels:
    image: "postgres_version_16_0"
  name: postgres
  # Use the timescaledb, since includes ai extension, since rke2 blocks a lot of the apt-get stuff
  #image: timescale/timescaledb-ha:pg16
  image: postgres:16.0
  imagePullPolicy: IfNotPresent
  replicas: 1
  env:
    - name: POSTGRES_PASSWORD
      value: "postgres"
  service_type: ClusterIP
  service:
    - protocol: TCP
      targetPort: 5432
      port: 5432
  securityContext:
    runAsUser: 0  # Run as root user to user persistent volume
    runAsGroup: 0
    fsGroup: 0    

