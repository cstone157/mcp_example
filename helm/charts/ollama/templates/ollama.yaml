{{- $object := .Values -}}
{{- if $object.enabled }}
  {{- $_ := set $object "version" .Values.global.version -}}
  {{- if not $object.namespace -}}
    {{- $_ := set $object "namespace" .Values.global.namespace -}}
  {{- end }}

  {{/* Add Service if they are required */}} 
  {{- template "mychart.service" $object }}

  {{/* Add Statefulset if they are required */}}
  {{- template "mychart.statefulset" $object }}
{{- end }}
