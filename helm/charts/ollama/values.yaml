name: ollama
image: ollama/ollama:0.13.1
imagePullPolicy: IfNotPresent
replicas: 1
env:
  - name: PRELOAD_MODELS
    value: "mistral:7b"
  - name: OLLAMA_KEEP_ALIVE 
    value: "12h"

service:
  - protocol: TCP
    port: 11434
    targetPort: 11434

persistence:
  name: ollama-volume
  enabled: true
  size: 20Gi
  accessMode: ReadWriteOnce
#  storageClass: "standard" # Uncomment if you need a specific class

