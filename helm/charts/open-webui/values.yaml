image:
  repository: ghcr.io/open-webui/open-webui
  tag: main
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80 # Exposed port
  targetPort: 8080 # Internal container port

persistence:
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce

# Configuration environment variables
config:
  # This default assumes the release name is "my-app" and the subchart is "ollama"
  # You will likely override this in the parent values.yaml
  ollamaBaseUrl: "http://my-app-ollama:11434"