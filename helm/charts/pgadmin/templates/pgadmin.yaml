{{- $object := .Values.pgadmin -}}
{{- $_ := set $object "version" .Values.version -}}
{{- if not $object.namespace -}}
    {{- $_ := set $object "namespace" .Values.namespace -}}
{{- end }}

{{- /*Generate the Service using the helper function to create our service*/ -}}
{{- template "mychart.service" $object }}

{{- /*Generate the StatefulSet using the helper function to create our StatefulSet*/ -}}
{{- template "mychart.statefulset" $object }}

{{- if $object.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
{{- template "mychart.metadata" $object }}
spec:
  rules:
  - host: localhost
    http:
      paths:
      - path: /pgadmin
        pathType: Prefix
        backend:
          service:
            name: {{ $object.name }}
            port:
              number: 30010
{{- end }}