
# ------------------------------------------------------------------------------
# Ollama :
# ------------------------------------------------------------------------------
enabled: true
namespace: mcp-example
name: ollama
image: ollama/ollama:0.13.2
imagePullPolicy: IfNotPresent
replicas: 1
env:
  - name: OLLAMA_HOST
    value: "0.0.0.0:11434" # Expose Ollama on all interfaces within the pod
  - name: PRELOAD_MODELS
    value: "mistral:7b"
  - name: OLLAMA_KEEP_ALIVE 
    value: "12h"
  - name: OLLAMA_DEBUG
    value: 1

service_type: ClusterIP
service:
  - protocol: TCP
    port: 11434
    targetPort: 11434

persistence:
  name: ollama-volume
  enabled: true
  size: 20Gi
  accessMode: ReadWriteOnce
#  storageClass: "standard" # Uncomment if you need a specific class

# Limit the resources.
resources: 
  requests:
    cpu: "2000m"
    memory: "4Gi"
  limits:
    cpu: "4000m"
    memory: "16Gi"


