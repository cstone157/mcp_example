agent:
  download:
    sourceURI: https://artifacts.elastic.co/downloads/
  monitoring:
    enabled: true
    use_output: default
    logs: true
    metrics: true
    traces: true
    namespace: default
  features: {}
inputs:
  - id: logfile-system-9db2036f-654e-4f25-8eb1-182d2431984f
    name: system-1
    revision: 1
    type: logfile
    use_output: default
    meta:
      package:
        name: system
        version: 2.12.4
        policy_template: system
        release: ga
    data_stream:
      namespace: default
    package_policy_id: 9db2036f-654e-4f25-8eb1-182d2431984f
    streams:
      - id: logfile-system.auth-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.auth
          type: logs
        condition: >-
          (${host.platform} != "windows") and (${host.os_version} != "12
          (bookworm)" and ${host.os_version} != "13 (trixie)" and
          (${host.os_platform} != "amzn" or ${host.os_version} != "2023") and
          (${host.os_platform} != "sles" and ${host.os_version} != "15 SP1" and
          ${host.os_version} != "15 SP2" and ${host.os_version} != "15 SP3" and
          ${host.os_version} != "15 SP4" and ${host.os_version} != "15 SP5" and
          ${host.os_version} != "15 SP6" and ${host.os_version} != "15 SP7"))
        ignore_older: 72h
        paths:
          - /var/log/auth.log*
          - /var/log/secure*
        exclude_files:
          - \.gz$
        multiline:
          pattern: ^\s
          match: after
        tags:
          - system-auth
        allow_deprecated_use: true
        processors:
          - add_locale: null
          - rename:
              fields:
                - from: message
                  to: event.original
              ignore_missing: true
              fail_on_error: false
          - syslog:
              field: event.original
              ignore_missing: true
              ignore_failure: true
      - id: logfile-system.syslog-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.syslog
          type: logs
        condition: >-
          (${host.platform} != "windows") and (${host.os_version} != "12
          (bookworm)" and ${host.os_version} != "13 (trixie)" and
          (${host.os_platform} != "amzn" or ${host.os_version} != "2023") and
          (${host.os_platform} != "sles" and ${host.os_version} != "15 SP1" and
          ${host.os_version} != "15 SP2" and ${host.os_version} != "15 SP3" and
          ${host.os_version} != "15 SP4" and ${host.os_version} != "15 SP5" and
          ${host.os_version} != "15 SP6" and ${host.os_version} != "15 SP7"))
        paths:
          - /var/log/messages*
          - /var/log/syslog*
          - /var/log/system*
        exclude_files:
          - \.gz$
        multiline:
          pattern: ^\s
          match: after
        processors:
          - add_locale: null
        allow_deprecated_use: true
        tags: null
        ignore_older: 72h
  - id: journald-system-9db2036f-654e-4f25-8eb1-182d2431984f
    name: system-1
    revision: 1
    type: journald
    use_output: default
    meta:
      package:
        name: system
        version: 2.12.4
        policy_template: system
        release: ga
    data_stream:
      namespace: default
    package_policy_id: 9db2036f-654e-4f25-8eb1-182d2431984f
    streams:
      - id: journald-system.auth-9db2036f-654e-4f25-8eb1-182d2431984f
        type: journald
        data_stream:
          dataset: system.auth
          type: logs
        facilities:
          - 4
          - 10
        condition: >-
          (${host.platform} != "windows") and (${host.os_version} == "12
          (bookworm)" or ${host.os_version} == "13 (trixie)" or
          (${host.os_platform} == "amzn" and ${host.os_version} == "2023") or
          (${host.os_platform} == "sles" and (${host.os_version} == "15 SP1" or
          ${host.os_version} == "15 SP2" or ${host.os_version} == "15 SP3" or
          ${host.os_version} == "15 SP4" or ${host.os_version} == "15 SP5" or
          ${host.os_version} == "15 SP6" or ${host.os_version} == "15 SP7")))
        tags: null
      - id: journald-system.syslog-9db2036f-654e-4f25-8eb1-182d2431984f
        type: journald
        data_stream:
          dataset: system.syslog
          type: logs
        facilities:
          - 0
          - 1
          - 2
          - 3
          - 5
          - 6
          - 7
          - 8
          - 9
          - 11
          - 12
          - 15
        condition: >-
          (${host.platform} != "windows") and (${host.os_version} == "12
          (bookworm)" or ${host.os_version} == "13 (trixie)" or
          (${host.os_platform} == "amzn" and ${host.os_version} == "2023") or
          (${host.os_platform} == "sles" and (${host.os_version} == "15 SP1" or
          ${host.os_version} == "15 SP2" or ${host.os_version} == "15 SP3" or
          ${host.os_version} == "15 SP4" or ${host.os_version} == "15 SP5" or
          ${host.os_version} == "15 SP6" or ${host.os_version} == "15 SP7")))
        tags: null
  - id: winlog-system-9db2036f-654e-4f25-8eb1-182d2431984f
    name: system-1
    revision: 1
    type: winlog
    use_output: default
    meta:
      package:
        name: system
        version: 2.12.4
        policy_template: system
        release: ga
    data_stream:
      namespace: default
    package_policy_id: 9db2036f-654e-4f25-8eb1-182d2431984f
    streams:
      - id: winlog-system.application-9db2036f-654e-4f25-8eb1-182d2431984f
        name: Application
        data_stream:
          dataset: system.application
          type: logs
        condition: ${host.platform} == 'windows'
        ignore_older: 72h
      - id: winlog-system.security-9db2036f-654e-4f25-8eb1-182d2431984f
        name: Security
        data_stream:
          dataset: system.security
          type: logs
        condition: ${host.platform} == 'windows'
        ignore_older: 72h
        tags: null
        include_xml: true
      - id: winlog-system.system-9db2036f-654e-4f25-8eb1-182d2431984f
        name: System
        data_stream:
          dataset: system.system
          type: logs
        condition: ${host.platform} == 'windows'
        ignore_older: 72h
  - id: system/metrics-system-9db2036f-654e-4f25-8eb1-182d2431984f
    name: system-1
    revision: 1
    type: system/metrics
    use_output: default
    meta:
      package:
        name: system
        version: 2.12.4
        policy_template: system
        release: ga
    data_stream:
      namespace: default
    package_policy_id: 9db2036f-654e-4f25-8eb1-182d2431984f
    streams:
      - id: system/metrics-system.cpu-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.cpu
          type: metrics
        metricsets:
          - cpu
        cpu.metrics:
          - percentages
          - normalized_percentages
        period: 10s
      - id: system/metrics-system.diskio-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.diskio
          type: metrics
        metricsets:
          - diskio
        diskio.include_devices: null
        period: 10s
      - id: system/metrics-system.filesystem-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.filesystem
          type: metrics
        metricsets:
          - filesystem
        period: 1m
        processors:
          - drop_event.when.regexp:
              system.filesystem.mount_point: ^/(sys|cgroup|proc|dev|etc|host|lib|snap)($|/)
      - id: system/metrics-system.fsstat-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.fsstat
          type: metrics
        metricsets:
          - fsstat
        period: 1m
        processors:
          - drop_event.when.regexp:
              system.fsstat.mount_point: ^/(sys|cgroup|proc|dev|etc|host|lib|snap)($|/)
      - id: system/metrics-system.load-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.load
          type: metrics
        metricsets:
          - load
        condition: ${host.platform} != 'windows'
        period: 10s
      - id: system/metrics-system.memory-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.memory
          type: metrics
        metricsets:
          - memory
        period: 10s
      - id: system/metrics-system.network-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.network
          type: metrics
        metricsets:
          - network
        period: 10s
        interfaces: null
        network.interfaces: null
      - id: system/metrics-system.process-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.process
          type: metrics
        metricsets:
          - process
        period: 10s
        process.include_top_n.by_cpu: 5
        process.include_top_n.by_memory: 5
        process.cmdline.cache.enabled: true
        process.cgroups.enabled: false
        process.include_cpu_ticks: false
        processes:
          - .*
      - id: >-
          system/metrics-system.process.summary-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.process.summary
          type: metrics
        metricsets:
          - process_summary
        period: 10s
      - id: >-
          system/metrics-system.socket_summary-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.socket_summary
          type: metrics
        metricsets:
          - socket_summary
        period: 10s
      - id: system/metrics-system.uptime-9db2036f-654e-4f25-8eb1-182d2431984f
        data_stream:
          dataset: system.uptime
          type: metrics
        metricsets:
          - uptime
        period: 10s
  - id: logfile-postgresql-c6dca679-38b4-4881-8a0e-e5b103df10a5
    name: Postgres
    revision: 2
    type: logfile
    use_output: default
    meta:
      package:
        name: postgresql
        version: 1.32.1
        policy_template: postgresql
        release: ga
    data_stream:
      namespace: default
    package_policy_id: c6dca679-38b4-4881-8a0e-e5b103df10a5
    streams:
      - id: logfile-postgresql.log-c6dca679-38b4-4881-8a0e-e5b103df10a5
        data_stream:
          dataset: postgresql.log
          type: logs
        paths:
          - /var/log/postgresql/postgresql-*-*.log*
          - /var/log/postgresql/postgresql-*-*.csv*
        exclude_files:
          - .gz$
        multiline:
          pattern: '^\d{4}-\d{2}-\d{2} '
          negate: true
          match: after
        tags:
          - postgresql-log
        allow_deprecated_use: true
        fields_under_root: true
        fields:
          _conf:
            tz_map: null
  - id: postgresql/metrics-postgresql-c6dca679-38b4-4881-8a0e-e5b103df10a5
    name: Postgres
    revision: 2
    type: postgresql/metrics
    use_output: default
    meta:
      package:
        name: postgresql
        version: 1.32.1
        policy_template: postgresql
        release: ga
    data_stream:
      namespace: default
    package_policy_id: c6dca679-38b4-4881-8a0e-e5b103df10a5
    streams:
      - id: >-
          postgresql/metrics-postgresql.activity-c6dca679-38b4-4881-8a0e-e5b103df10a5
        data_stream:
          dataset: postgresql.activity
          type: metrics
        metricsets:
          - activity
        hosts:
          - postgres://postgres:5432
        period: 10s
      - id: >-
          postgresql/metrics-postgresql.bgwriter-c6dca679-38b4-4881-8a0e-e5b103df10a5
        data_stream:
          dataset: postgresql.bgwriter
          type: metrics
        metricsets:
          - bgwriter
        hosts:
          - postgres://postgres:5432
        period: 10s
      - id: >-
          postgresql/metrics-postgresql.database-c6dca679-38b4-4881-8a0e-e5b103df10a5
        data_stream:
          dataset: postgresql.database
          type: metrics
        metricsets:
          - database
        hosts:
          - postgres://postgres:5432
        period: 10s
      - id: >-
          postgresql/metrics-postgresql.statement-c6dca679-38b4-4881-8a0e-e5b103df10a5
        data_stream:
          dataset: postgresql.statement
          type: metrics
        metricsets:
          - statement
        hosts:
          - postgres://postgres:5432
        period: 10s
secret_references: []
namespaces:
