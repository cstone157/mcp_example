apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-repository
  labels:
    app: image-repository
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1  # Adjust as needed for desired availability
  selector:
    matchLabels:
      app: image-repository
  template:
    metadata:
      labels:
        app: image-repository
    spec:
      containers:
      - name: registry
        image: registry:2  # Or your preferred registry image
        ports:
        - containerPort: 5000  # Standard registry port
          name: registry-port
        volumeMounts:
        - name: registry-data
          mountPath: /var/lib/registry  # Where images are stored
        - name: registry-certs
          mountPath: /certs
          readOnly: true  # Important: Prevents accidental modification
        env:
        - name: REGISTRY_STORAGE_DELETE_ENABLED
          value: "true" # Enable image deletion, USE WITH CAUTION!
        - name: REGISTRY_HTTP_ADDR
          value: ":5000"
        - name: REGISTRY_HTTP_TLS_CERTIFICATE
          value: /certs/tls.crt  # Path to your TLS certificate
        - name: REGISTRY_HTTP_TLS_KEY
          value: /certs/tls.key  # Path to your TLS key
      volumes:
      - name: registry-data
        persistentVolumeClaim:
          claimName: registry-pvc  # Replace with your PVC name or define an inline volume
      - name: registry-certs
        secret:
          #secretName: registry-tls # Replace with the name of your secret containing TLS certificates
          secretName: image-repository-tls-ingress
          defaultMode: 0400        # Ensure appropriate permissions