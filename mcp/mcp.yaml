---
# kubernetes/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-services
---
# kubernetes/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-config
  namespace: mcp-services
data:
  API_BASE_URL: "http://localhost:3000"
  OLLAMA_BASE_URL: "http://ollama.tmdash.org"
---
# kubernetes/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parts-warehouse-mcp
  namespace: mcp-services
  labels:
    app: parts-warehouse-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parts-warehouse-mcp
  template:
    metadata:
      labels:
        app: parts-warehouse-mcp
    spec:
      containers:
      - name: mcp-server
        image: parts-warehouse-mcp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-config
              key: API_BASE_URL
        - name: OLLAMA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: mcp-config
              key: OLLAMA_BASE_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      restartPolicy: Always
---
# kubernetes/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: parts-warehouse-mcp
  namespace: mcp-services
  labels:
    app: parts-warehouse-mcp
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: parts-warehouse-mcp
---
# kubernetes/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parts-warehouse-mcp
  namespace: mcp-services
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: mcp.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: parts-warehouse-mcp
            port:
              number: 8080
---
# kubernetes/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: parts-warehouse-mcp-hpa
  namespace: mcp-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parts-warehouse-mcp
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---